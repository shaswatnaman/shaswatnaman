<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shaswat Naman — Founder-Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E16"/>
      <stop offset="1" stop-color="#0E1320"/>
    </linearGradient>
    <radialGradient id="aura1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#E8A87C" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#E8A87C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura3" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
    <clipPath id="card"><rect x="8" y="8" width="1184" height="304" rx="22"/></clipPath>
  </defs>

  <rect x="8" y="8" width="1184" height="304" rx="22" fill="url(#bg)"/>
  <g clip-path="url(#card)">
    <rect x="8" y="8" width="1184" height="304" fill="url(#dots)"/>

    <!-- drifting auras -->
    <circle cx="240" cy="120" r="260" fill="url(#aura1)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 60 30; 0 0" dur="16s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="240" r="240" fill="url(#aura2)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -50 -28; 0 0" dur="19s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="40" r="200" fill="url(#aura3)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 30 40; 0 0" dur="22s" repeatCount="indefinite"/>
    </circle>

    <!-- thin accent rule -->
    <rect x="72" y="206" width="0" height="2" rx="1" fill="#6366F1" fill-opacity="0.7">
      <animate attributeName="width" from="0" to="120" dur="1.1s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- text -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.15s" fill="freeze"/>
    <text x="72" y="132" fill="#F4F6FB" font-size="58" font-weight="650" letter-spacing="-1.5">Shaswat Naman</text>
    <text x="74" y="178" fill="#AAB4C8" font-size="23" font-weight="500" letter-spacing="0.2">Founder-Engineer  ·  iOS · AI · Human-Centered Systems</text>
    <text x="74" y="252" fill="#7E8AA3" font-size="18" font-weight="400" letter-spacing="0.2">I find human problems, design the systems, and ship the product.</text>
  </g>

  <!-- pillar chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.7s" fill="freeze"/>
    <g>
      <rect x="74" y="272" width="184" height="28" rx="14" fill="#6366F1" fill-opacity="0.14" stroke="#6366F1" stroke-opacity="0.35"/>
      <text x="92" y="290" fill="#C7CDF7">Emotional Wellness Tech</text>
    </g>
    <g>
      <rect x="270" y="272" width="196" height="28" rx="14" fill="#E8A87C" fill-opacity="0.13" stroke="#E8A87C" stroke-opacity="0.32"/>
      <text x="288" y="290" fill="#F0CBA8">Cultural Tech · Stealth</text>
    </g>
    <g>
      <rect x="478" y="272" width="168" height="28" rx="14" fill="#34D399" fill-opacity="0.12" stroke="#34D399" stroke-opacity="0.30"/>
      <text x="496" y="290" fill="#A7E9CF">Systems &amp; Tools</text>
    </g>
  </g>
</svg>
